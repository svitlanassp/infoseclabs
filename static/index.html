<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfoSec Labs</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --text-muted: #94a3b8; }
        body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #60a5fa, #a78bfa); -webkit-background-clip: text; color: transparent; }
        p { color: var(--text-muted); margin-bottom: 40px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card { background: var(--card); border: 1px solid #334155; border-radius: 12px; padding: 30px; width: 300px; text-align: center; text-decoration: none; color: var(--text); transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 15px -3px rgba(59,130,246,0.2); }
        .card h2 { margin-top: 0; font-size: 1.5rem; color: var(--accent); }
    </style>
</head>
<body>
    <h1>Information Security</h1>
    <p></p>
    <div class="grid">
        <a href="/static/lab1.html" class="card"><h2>Lab 1</h2><p>PRNG</p></a>
        <a href="/static/lab2.html" class="card"><h2>Lab 2</h2><p>MD5</p></a>
        <a href="/static/lab3.html" class="card"><h2>Lab 3</h2><p>RC5</p></a>
        <a href="/static/lab4.html" class="card"><h2>Lab 4</h2><p>RSA</p></a>
        <a href="/static/lab5.html" class="card"><h2>Lab 5</h2><p>DSA</p></a>
    </div>
</body>
</html>
